<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio - Teoría de Sistemas (Capítulos 1 y 2)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        
        .chapter-selector { text-align: center; margin-bottom: 20px; padding: 15px; background: #ecf0f1; border-radius: 8px; }
        select { padding: 10px; font-size: 1em; border-radius: 5px; border: 1px solid #bdc3c7; cursor: pointer; }

        .tabs { display: flex; justify-content: center; margin-bottom: 25px; gap: 10px; }
        .tab-btn { padding: 12px 25px; cursor: pointer; border: none; background: #bdc3c7; color: white; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #3498db; }
        
        .content { display: none; }
        .content.active { display: block; }
        
        .question-card { margin-bottom: 25px; padding: 20px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fafafa; }
        .options-list { list-style: none; padding: 0; margin-top: 15px; }
        .options-list li { margin-bottom: 10px; }
        .option-btn { width: 100%; text-align: left; padding: 10px 15px; border: 2px solid #ddd; border-radius: 6px; background: white; cursor: pointer; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #ebf5fb; }
        
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .incorrect { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .feedback-text { margin-top: 10px; font-weight: bold; display: none; }
        
        .submit-btn { display: block; width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .results-box { display: none; margin-top: 30px; padding: 25px; border-radius: 10px; text-align: center; }
        .score { font-size: 2em; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <h1>SIS308 - Teoría de Sistemas</h1>
    
    <div class="chapter-selector">
        <label for="cap-select"><strong>Elegir Capítulo:</strong></label>
        <select id="cap-select" onchange="changeChapter()">
    <option value="1">Capítulo 1: Fundamentos de la Ciencia de Sistemas</option>
    <option value="2">Capítulo 2: La Moral de Sistemas</option>
    <option value="3">Capítulo 3: Características y Taxonomía</option>
<option value="5">Capítulo 5: Modelos y Patrones de Pensamiento</option>
 </select>
    
    </div>
    
    <div class="tabs">
        <button id="btn-estudio" class="tab-btn active" onclick="showTab('estudio')">Modo Estudio</button>
        <button id="btn-examen" class="tab-btn" onclick="showTab('examen')">Modo Examen</button>
    </div>

    <div id="estudio" class="content active">
        <div id="estudio-questions"></div>
    </div>

    <div id="examen" class="content">
        <div id="examen-questions"></div>
        <button class="submit-btn" onclick="gradeExamen()">Finalizar Examen</button>
        <div id="examen-results" class="results-box"></div>
    </div>
</div>

<script>
const baseDePreguntas = {

        { q: "¿Qué dice Jordan sobre la estructura a largo plazo?", options: ["Es eterna", "Cambia por la entropía", "Se vuelve más fuerte", "No existe"], correct: 1 },

        { q: "¿Qué permite la taxonomía de Boulding entre expertos de distintas áreas?", options: ["Pelearse", "Un lenguaje común para comunicarse", "No hablarse", "Dividir las ciencias"], correct: 1 },
        { q: "¿Cuál es la característica principal de los Sistemas de Actividad Humana?", options: ["La mecánica", "La intencionalidad y relaciones interpersonales", "La falta de propósito", "La estática"], correct: 1 },
        { q: "Los sistemas culturales (ciudades, partidos políticos) son parte de:", options: ["Sistemas físicos", "Sistemas formados por agrupación de personas", "Sistemas estáticos", "Sistemas de nivel 1"], correct: 1 }
    ],
    "5": [
        { q: "Si un modelo representa fielmente la realidad pero no ayuda a resolver el problema del analista, ¿qué principio de modelación está fallando?", options: ["La formalidad", "La selección de aspectos de interés (Abstracción)", "La sintaxis", "La capacidad física"], correct: 1 },

        { q: "Un diagrama UML que muestra la comunicación entre componentes es una 'vista' del sistema. ¿Qué justifica el uso de múltiples vistas?", options: ["Que el cliente quiere ver muchos dibujos", "Que ninguna vista por sí sola puede representar la totalidad de un sistema complejo", "Que UML obliga a usar al menos diez vistas", "Que así se gasta más tiempo de consultoría"], correct: 1 },
        { q: "Si dos analistas crean modelos diferentes sobre el mismo sistema y ambos son correctos, esto demuestra que el modelo es:", options: ["Erróneo", "Subjetivo (depende de la perspectiva del modelador)", "Inconsistente", "Un modelo físico"], correct: 1 },
        { q: "¿Qué diferencia fundamental separa a un modelo 'Formal' de uno 'Informal'?", options: ["El uso de herramientas digitales", "La existencia de una semántica y sintaxis rigurosa que permite verificación", "Que el formal es más caro", "Que el informal solo se hace a mano"], correct: 1 },
        { q: "Al utilizar UML para 'capturar conocimiento', el modelo actúa como:", options: ["Un repositorio de código", "Un mecanismo de preservación de la lógica del negocio ante la evolución del diseño", "Un firewall", "Una base de datos de usuarios"], correct: 1 },

        { q: "La modelación ayuda a la 'validación' del sistema porque permite:", options: ["Escribir código más rápido", "Comparar el comportamiento esperado del modelo contra los requerimientos del cliente", "Borrar el sistema anterior", "Vender el producto"], correct: 1 },

        { q: "Un prototipo de software (mockup) que el cliente puede tocar y probar se clasifica como:", options: ["Modelo mental", "Modelo Físico (representación tangible del concepto)", "Modelo Matemático", "Modelo Trascendental"], correct: 1 },

        { q: "¿Qué relación hay entre el término latino 'modulus' y la ingeniería de sistemas?", options: ["Significa 'computadora'", "Se refiere a la medida o módulo que sirve de comparación para la realidad", "Significa 'dibujo'", "No tiene relación"], correct: 1 },

let currentChapter = "1";
let userAnswers = [];

function changeChapter() {
    currentChapter = document.getElementById('cap-select').value;
    resetState();
    loadQuestions();
}

function resetState() {
    userAnswers = Array(baseDePreguntas[currentChapter].length).fill(null);
    document.getElementById('examen-results').style.display = "none";
    showTab('estudio'); // Por defecto volver a estudio al cambiar
}

function showTab(tabId) {
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    
    if(tabId === 'estudio') document.getElementById('btn-estudio').classList.add('active');
    else document.getElementById('btn-examen').classList.add('active');
}

function loadQuestions() {
    const preguntas = baseDePreguntas[currentChapter];
    const estudioDiv = document.getElementById('estudio-questions');
    const examenDiv = document.getElementById('examen-questions');
    
    estudioDiv.innerHTML = "";
    examenDiv.innerHTML = "";
    
    preguntas.forEach((p, index) => {
        // Render Modo Estudio
        estudioDiv.innerHTML += `
            <div class="question-card">
                <p><strong>${index + 1}. ${p.q}</strong></p>
                <div class="options-list">
                    ${p.options.map((opt, i) => `
                        <li><button class="option-btn" onclick="checkEstudio(this, ${index}, ${i})">${opt}</button></li>
                    `).join('')}
                </div>
                <p id="feedback-${index}" class="feedback-text"></p>
            </div>
        `;

        // Render Modo Examen
        examenDiv.innerHTML += `
            <div class="question-card" id="q-examen-${index}">
                <p><strong>${index + 1}. ${p.q}</strong></p>
                <div class="options-list">
                    ${p.options.map((opt, i) => `
                        <li><button class="option-btn q-examen-btn-${index}" onclick="selectExamen(this, ${index}, ${i})">${opt}</button></li>
                    `).join('')}
                </div>
            </div>
        `;
    });
}

function checkEstudio(btn, qIdx, optIdx) {
    const preguntas = baseDePreguntas[currentChapter];
    const card = btn.closest('.question-card');
    const feedback = document.getElementById(`feedback-${qIdx}`);
    const buttons = card.querySelectorAll('.option-btn');
    
    buttons.forEach(b => b.disabled = true);
    
    if(optIdx === preguntas[qIdx].correct) {
        btn.classList.add('correct');
        feedback.innerText = "¡Correcto!";
        feedback.style.color = "#28a745";
    } else {
        btn.classList.add('incorrect');
        buttons[preguntas[qIdx].correct].classList.add('correct');
        feedback.innerText = "Incorrecto. Repasa la teoría.";
        feedback.style.color = "#dc3545";
    }
    feedback.style.display = "block";
}

function selectExamen(btn, qIdx, optIdx) {
    const buttons = document.querySelectorAll(`.q-examen-btn-${qIdx}`);
    buttons.forEach(b => {
        b.style.borderColor = "#ddd";
        b.style.backgroundColor = "white";
    });
    btn.style.borderColor = "#3498db";
    btn.style.backgroundColor = "#ebf5fb";
    userAnswers[qIdx] = optIdx;
}

function gradeExamen() {
    const preguntas = baseDePreguntas[currentChapter];
    let score = 0;
    
    preguntas.forEach((p, i) => {
        const buttons = document.querySelectorAll(`.q-examen-btn-${i}`);
        buttons.forEach(b => b.disabled = true);
        
        if(userAnswers[i] === p.correct) {
            score++;
            buttons[p.correct].classList.add('correct');
        } else {
            if(userAnswers[i] !== null) buttons[userAnswers[i]].classList.add('incorrect');
            buttons[p.correct].classList.add('correct');
        }
    });
    
    const resultsBox = document.getElementById('examen-results');
    resultsBox.style.display = "block";
    resultsBox.style.backgroundColor = (score/preguntas.length) >= 0.51 ? "#d4edda" : "#f8d7da";
    resultsBox.innerHTML = `
        <p class="score">Nota: ${(score/preguntas.length * 100).toFixed(0)}/100</p>
        <p>Acertaste ${score} de ${preguntas.length} preguntas.</p>
        <button class="submit-btn" style="background:#3498db" onclick="changeChapter()">Reiniciar Capítulo</button>
    `;
    window.scrollTo(0, document.body.scrollHeight);
}

// Inicio inicial
changeChapter();
</script>

</body>
</html>
